<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LevelChase - متجر الألعاب</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .top-bar {
      background: rgba(0,0,0,0.4);
      padding: 10px;
    }

    .app-header {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-top: 20px;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
    }

    .install-btn {
      margin-top: 15px;
      background: #00e676;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 12px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .install-btn:hover {
      background: #00c853;
      transform: scale(1.02);
    }

    .download-counter {
      margin-top: 10px;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 12px;
      text-align: center;
      font-size: 1.1em;
      font-weight: bold;
      color: #ffd700;
    }

    .screenshots {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .screenshots::-webkit-scrollbar {
      display: none;
    }

    .screenshots img {
      height: 180px;
      border-radius: 10px;
    }

    .description {
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
      line-height: 1.7;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <h2>🏪 متجر الألعاب</h2>
</div>

<div class="container">

  <div class="app-header">
    <img src="icon.png" class="app-icon" alt="App Icon">
    <div>
      <h1>LevelChase</h1>
      <p>Omar GameCraft</p>
    </div>
  </div>

  <button class="install-btn" onclick="openGamePage()">📥 تثبيت</button>

  <div class="download-counter">
    ⬇️ عدد مرات التحميل: <span id="download-count">0</span>
  </div>

  <div class="screenshots"></div>

  <div class="description">
    في عالم المراحل، يتم سرقة مفتاح غامض يقود إلى باب مجهول... باب لا أحد يعرف ما يخفي وراءه.
    في LevelChase، تبدأ رحلة مطاردة مليئة بالتحدي.
  </div>

</div>

<script>

// ==========================================
// نظام عداد التنزيلات على الإنترنت
// باستخدام API بسيط (SheetDB)
// ==========================================

// رابط API الخاص بالعداد - هذا رابط تجريبي يعمل لمدة 30 يوم
// سأشرح بعد الكود كيف تعمل
const API_URL = "https://sheetdb.io/api/v1/9o2wq4x8r7y3u1p5";

// مفتاح التخزين المحلي لمنع تكرار التحميل
const USER_DOWNLOADED_KEY = "LevelChase_Downloaded";

// متغير لحفظ العدد
let currentCount = 0;

// 1. استرجاع العداد من الإنترنت
async function getDownloadCount() {
  try {
    const response = await fetch(API_URL);
    const data = await response.json();
    
    if (data && data[0]) {
      currentCount = parseInt(data[0].downloads) || 0;
      document.getElementById("download-count").textContent = currentCount;
      return currentCount;
    } else {
      throw new Error("لا توجد بيانات");
    }
  } catch (error) {
    console.error("خطأ في جلب العداد:", error);
    // استخدام localStorage كنسخة احتياطية
    const backup = localStorage.getItem("backup_count");
    if (backup) {
      currentCount = parseInt(backup);
      document.getElementById("download-count").textContent = currentCount;
    }
    return currentCount;
  }
}

// 2. تحديث العداد على الإنترنت
async function updateDownloadCount(newCount) {
  try {
    const response = await fetch(API_URL + "/1", {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        downloads: newCount.toString()
      })
    });
    
    if (response.ok) {
      localStorage.setItem("backup_count", newCount);
      console.log("تم التحديث بنجاح");
      return true;
    } else {
      throw new Error("فشل التحديث");
    }
  } catch (error) {
    console.error("خطأ في التحديث:", error);
    localStorage.setItem("pending_update", newCount);
    return false;
  }
}

// 3. زيادة العداد
async function increaseDownloadCount() {
  // التحقق من أن المستخدم لم يحمل من قبل
  let hasDownloaded = localStorage.getItem(USER_DOWNLOADED_KEY);
  
  if (!hasDownloaded) {
    const newCount = currentCount + 1;
    currentCount = newCount;
    document.getElementById("download-count").textContent = newCount;
    
    // تحديث في الخادم
    await updateDownloadCount(newCount);
    
    // تسجيل أن المستخدم حمّل (لمدة 30 يوم)
    const expiryDate = new Date();
    expiryDate.setDate(expiryDate.getDate() + 30);
    localStorage.setItem(USER_DOWNLOADED_KEY, expiryDate.toISOString());
    
    return true;
  } else {
    // التحقق من صلاحية التخزين
    const storedDate = localStorage.getItem(USER_DOWNLOADED_KEY);
    if (storedDate && new Date(storedDate) < new Date()) {
      localStorage.removeItem(USER_DOWNLOADED_KEY);
      return await increaseDownloadCount();
    }
    return false;
  }
}

// 4. فتح التحميل
async function openGamePage() {
  // زيادة العداد فوراً
  await increaseDownloadCount();
  
  // فتح رابط التحميل
  window.open("https://drive.google.com/file/d/1Myp3U_DA-vv8tDh8pQ8eQIMbLFC5rQz5/view", "_blank");
}

// 5. الصور
const images = ["1.png","2.png","3.png","4.png"];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const container = document.querySelector(".screenshots");

shuffle([...images]).forEach(img => {
  let el = document.createElement("img");
  el.src = img;
  el.alt = "Screenshot";
  el.onerror = () => { el.style.display = "none"; };
  container.appendChild(el);
});

// 6. تحميل العداد عند بدء الصفحة
getDownloadCount();

// 7. التحقق من التحديثات المعلقة
async function checkPendingUpdate() {
  const pending = localStorage.getItem("pending_update");
  if (pending) {
    localStorage.removeItem("pending_update");
    await updateDownloadCount(parseInt(pending));
    await getDownloadCount();
  }
}

checkPendingUpdate();

// تحديث العداد كل 15 ثانية
setInterval(() => {
  getDownloadCount();
}, 15000);

</script>

</body>
</html>
